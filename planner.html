<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Гросбух — особистий планувальник</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1B2027;
    --panel:#242B34;
    --panel-2:#2B333E;
    --line:#3A4250;
    --ink:#ECE7DA;
    --muted:#8B93A0;
    --accent:#D4A94F;
    --accent-dim:rgba(212,169,79,.18);
    --teal:#4F8F82;
    --coral:#C1666B;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;
    overflow:hidden;touch-action:manipulation;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* ── layout ── */
  .app{
    display:flex;flex-direction:column;
    height:100vh;height:100dvh;width:100vw;
  }

  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px;flex-shrink:0;gap:12px;flex-wrap:wrap;
    border-bottom:1px solid var(--line);
  }
  .month-nav{display:flex;align-items:center;gap:14px;}
  .month-nav button{
    background:none;border:1px solid var(--line);color:var(--muted);
    width:32px;height:32px;border-radius:4px;cursor:pointer;
    font-size:16px;font-family:'IBM Plex Mono',monospace;
    transition:border-color .15s,color .15s;
  }
  .month-nav button:hover{border-color:var(--accent);color:var(--accent);}
  .month-nav button:active{transform:scale(.94);}

  h1{font-family:'Fraunces',serif;font-weight:600;font-size:28px;
     letter-spacing:.5px;margin:0;text-transform:uppercase;}
  h1 .year{color:var(--muted);font-weight:500;}

  .actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  .pill-btn{
    background:var(--panel);border:1px solid var(--line);color:var(--ink);
    padding:7px 14px;border-radius:20px;font-family:'Inter',sans-serif;
    font-size:13px;cursor:pointer;transition:border-color .15s;
  }
  .pill-btn:hover{border-color:var(--accent);}
  .pill-btn:active,.theme-btn:active{transform:scale(.96);}

  /* ── theme button + popover ── */
  .theme-btn{
    display:flex;align-items:center;gap:8px;
    background:var(--panel);border:1px solid var(--line);color:var(--ink);
    padding:7px 14px;border-radius:20px;font-family:'Inter',sans-serif;
    font-size:13px;cursor:pointer;transition:border-color .15s;
  }
  .theme-btn:hover,.theme-btn.open{border-color:var(--accent);}
  .theme-btn-dot{
    width:14px;height:14px;border-radius:50%;flex-shrink:0;
    border:2px solid rgba(255,255,255,.25);
    box-shadow:0 0 0 1px rgba(0,0,0,.25);
  }
  .swatch{
    width:22px;height:22px;border-radius:50%;
    /* завжди видима рамка, щоб темні кружечки не зливались з фоном */
    border:2px solid rgba(255,255,255,0.18);
    cursor:pointer;padding:0;flex-shrink:0;
    transition:transform .12s,border-color .12s,box-shadow .12s;
    box-shadow:0 0 0 1px rgba(0,0,0,.3);
  }
  .swatch:hover{transform:scale(1.2);}
  .swatch.active{
    border-color:var(--ink) !important;
    box-shadow:0 0 0 1px var(--ink);
  }
  .swatch-custom{
    position:relative;overflow:hidden;
    background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);
  }
  .swatch-custom input[type=color]{
    position:absolute;inset:-2px;opacity:0;cursor:pointer;
    width:calc(100% + 4px);height:calc(100% + 4px);
  }

  .save-status{
    font-family:'IBM Plex Mono',monospace;font-size:11px;
    color:var(--muted);opacity:0;transition:opacity .3s;
  }
  .save-status.show{opacity:1;color:var(--teal);}

  /* ── calendar ── */
  .calendar-body{flex:1;display:flex;flex-direction:column;min-height:0;}
  .weekdays{
    display:grid;grid-template-columns:repeat(7,1fr);
    flex-shrink:0;border-bottom:1px solid var(--line);
  }
  .weekdays div{
    text-align:center;font-family:'IBM Plex Mono',monospace;
    font-size:11px;color:var(--muted);letter-spacing:1px;
    padding:6px 0;border-right:1px solid var(--line);
  }
  .weekdays div:last-child{border-right:none;}
  .grid{
    flex:1;display:grid;
    grid-template-columns:repeat(7,1fr);
    grid-template-rows:repeat(var(--weeks,5),1fr);
    min-height:0;
  }
  .cell{
    background:var(--panel);border-right:1px solid var(--line);
    border-bottom:1px solid var(--line);padding:4px;
    display:flex;flex-direction:column;min-height:0;
    cursor:pointer;position:relative;
    transition:background .15s,box-shadow .15s;overflow:hidden;
  }
  .cell:nth-child(7n){border-right:none;}
  .cell:hover{background:var(--panel-2);}
  .cell.outside{opacity:.32;}
  .cell.today{box-shadow:inset 0 0 0 2px var(--accent);}
  .cell.drop-target{background:var(--panel-2);box-shadow:inset 0 0 0 2px var(--accent);}
  .cell .datenum{
    font-family:'IBM Plex Mono',monospace;font-size:12px;
    color:var(--muted);flex-shrink:0;line-height:1;margin-bottom:3px;
  }
  .cell.today .datenum{color:var(--accent);font-weight:600;}
  .cell-items{flex:1;display:flex;flex-direction:column;gap:2px;overflow:hidden;min-height:0;}
  .cell-item{
    font-size:10px;line-height:1.25;padding:2px 5px;border-radius:3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    cursor:grab;flex-shrink:0;user-select:none;
    text-shadow:0 1px 1px rgba(0,0,0,.3);
    transition:opacity .15s;
  }
  .cell-item:active{cursor:grabbing;}
  .cell-item.dragging{opacity:.3;}
  .cell-item.done{opacity:.4;text-decoration:line-through;}

  /* ── side panel ── */
  .overlay{
    position:fixed;inset:0;background:rgba(10,12,15,.5);
    display:none;align-items:stretch;justify-content:flex-end;z-index:50;
  }
  .overlay.open{display:flex;}
  .panel{
    width:400px;max-width:92vw;background:var(--panel-2);
    border-left:1px solid var(--line);padding:26px 22px;
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    animation:slidein .18s ease-out;position:relative;
  }
  .panel-handle{
    display:none;width:36px;height:4px;background:var(--line);
    border-radius:2px;margin:0 auto 16px;
  }
  @keyframes slidein{from{transform:translateX(24px);opacity:0;}to{transform:none;opacity:1;}}
  @keyframes slideup{from{transform:translateY(100%);}to{transform:none;}}
  .panel h2{font-family:'Fraunces',serif;font-size:22px;margin:0 0 2px;text-transform:capitalize;}
  .panel .sub{color:var(--muted);font-size:12px;font-family:'IBM Plex Mono',monospace;margin-bottom:14px;}
  .panel .close{
    position:absolute;top:20px;right:20px;
    background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;
    width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  }
  .panel-hint{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.4;}
  .item-list{min-height:40px;}
  .item-row{
    display:flex;align-items:center;gap:8px;
    padding:8px 6px;border-bottom:1px solid var(--line);
    border-left:3px solid var(--accent);border-radius:0 4px 4px 0;
    background:rgba(0,0,0,.12);margin-bottom:4px;
    transition:opacity .15s;
  }
  .item-row.dragging{opacity:.35;}
  .item-row.drag-over{border-top:2px solid var(--accent);}
  .item-row.done .item-text{color:var(--muted);text-decoration:line-through;}
  .drag-handle{
    cursor:grab;color:var(--muted);font-size:14px;
    padding:0 2px;user-select:none;flex-shrink:0;opacity:.5;
  }
  .drag-handle:hover{opacity:1;color:var(--accent);}
  .drag-handle:active{cursor:grabbing;}
  .item-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--teal);flex-shrink:0;cursor:pointer;}
  .item-text{flex:1;font-size:14px;min-width:0;word-break:break-word;}
  .color-dot{
    width:20px;height:20px;border-radius:50%;
    border:2px solid rgba(255,255,255,.2);cursor:pointer;flex-shrink:0;
    transition:transform .12s;
  }
  .color-dot:hover{transform:scale(1.15);}
  .del-btn{
    background:none;border:none;color:var(--muted);cursor:pointer;
    font-size:16px;opacity:.35;padding:2px 6px;border-radius:4px;flex-shrink:0;
    transition:opacity .15s,color .15s,background .15s;
  }
  .item-row:hover .del-btn{opacity:1;}
  .del-btn:hover{color:var(--coral);background:rgba(193,102,107,.12);}

  .add-row{display:flex;gap:8px;margin-top:12px;}
  .add-row input{
    flex:1;background:var(--panel);border:1px solid var(--line);
    color:var(--ink);padding:8px 10px;border-radius:4px;
    font-family:'Inter',sans-serif;font-size:16px;
  }
  .add-row input:focus{outline:none;border-color:var(--accent);}
  .add-row button{
    background:var(--accent);border:none;color:#1B2027;
    font-weight:600;padding:0 18px;border-radius:4px;cursor:pointer;
    min-width:44px;min-height:44px;font-size:18px;
  }
  .empty-note{color:var(--muted);font-size:13px;padding:8px 0;}

  /* ── global color popover (position:fixed, never clipped) ── */
  .color-pop{
    position:fixed;z-index:200;
    background:var(--panel-2);border:1px solid var(--line);
    border-radius:10px;padding:10px;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
    display:none;
  }
  .color-pop.open{display:block;}
  .color-pop-title{
    font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;
    letter-spacing:.5px;margin-bottom:8px;
  }
  .color-pop-swatches{display:flex;flex-wrap:wrap;gap:6px;width:164px;}
  .color-pop .swatch{width:26px;height:26px;border:2px solid rgba(255,255,255,0.18);}

  /* ── mobile ── */
  @media(max-width:768px){
    .topbar{
      padding:8px 10px;gap:8px;
      flex-direction:column;align-items:stretch;
    }
    .month-nav{justify-content:center;}
    .month-nav button{
      width:44px;height:44px;font-size:20px;
    }
    h1{font-size:22px;}
    .actions{
      justify-content:center;gap:8px;
    }
    .theme-btn,.pill-btn{
      min-height:44px;padding:10px 16px;font-size:14px;
    }
    .save-status{font-size:10px;}

    .weekdays div{font-size:10px;padding:6px 0;}
    .grid{
      /* Cells are taller on mobile so content is readable and tap targets are comfortable */
      grid-template-rows:repeat(var(--weeks,5), minmax(90px, 1fr));
    }
    .calendar-body{overflow-y:auto;-webkit-overflow-scrolling:touch;}
    .cell{padding:5px 4px;}
    .cell .datenum{font-size:13px;margin-bottom:4px;}
    .cell-item{
      font-size:11px;padding:4px 6px;border-radius:4px;
      min-height:24px;line-height:1.3;
    }

    .overlay{align-items:flex-end;justify-content:center;}
    .panel{
      width:100%;max-width:100%;
      border-left:none;border-top:1px solid var(--line);
      border-radius:16px 16px 0 0;
      max-height:88vh;
      padding:12px 16px calc(16px + env(safe-area-inset-bottom));
      animation:slideup .22s ease-out;
    }
    .panel-handle{display:block;}
    .panel h2{font-size:20px;padding-right:40px;}
    .panel .close{top:12px;right:8px;}
    .panel-hint{font-size:11px;}

    .item-row{
      padding:10px 8px;gap:10px;
      min-height:48px;
    }
    .item-text{font-size:15px;}
    .drag-handle{font-size:18px;padding:4px;opacity:.6;}
    .color-dot{width:28px;height:28px;}
    .del-btn{
      font-size:20px;opacity:.6;
      min-width:44px;min-height:44px;
      display:flex;align-items:center;justify-content:center;
    }
    .item-row input[type=checkbox]{width:22px;height:22px;}

    .color-pop{
      max-width:calc(100vw - 24px);
      padding:12px;
    }
    .color-pop-swatches{width:auto;justify-content:center;}
    .color-pop .swatch{width:32px;height:32px;}
  }

  /* ── touch drag ghost (mobile only) ── */
  .touch-ghost{
    position:fixed;z-index:500;pointer-events:none;
    padding:6px 10px;border-radius:6px;
    font-family:'Inter',sans-serif;font-size:13px;font-weight:500;
    white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis;
    box-shadow:0 6px 24px rgba(0,0,0,.5);
    opacity:.9;transform:scale(1.08) rotate(-2deg);
    transition:transform .1s;
    display:none;
  }
  .touch-ghost.active{display:block;}

  @media(max-width:380px){
    h1{font-size:18px;}
    .month-nav{gap:8px;}
    .actions{flex-wrap:wrap;}
    .cell-item{font-size:8px;}
    .weekdays div{font-size:9px;letter-spacing:0;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="month-nav">
      <button id="prevBtn" title="Попередній місяць">‹</button>
      <h1 id="monthTitle">— <span class="year">—</span></h1>
      <button id="nextBtn" title="Наступний місяць">›</button>
    </div>
    <div class="actions">
      <button type="button" class="theme-btn" id="themeBtn" title="Колір календаря">
        <span class="theme-btn-dot" id="themeBtnDot"></span>
        Тема
      </button>
      <span class="save-status" id="saveStatus">Збережено</span>
      <button class="pill-btn" id="todayBtn">Сьогодні</button>
    </div>
  </div>
  <div class="calendar-body">
    <div class="weekdays">
      <div>ПН</div><div>ВТ</div><div>СР</div><div>ЧТ</div><div>ПТ</div><div>СБ</div><div>НД</div>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- side panel -->
<div class="overlay" id="overlay">
  <div class="panel">
    <div class="panel-handle"></div>
    <button class="close" id="panelClose" title="Закрити">✕</button>
    <h2 id="panelDate">—</h2>
    <div class="sub" id="panelWeekday">—</div>
    <div class="panel-hint">Перетягни блок на потрібний день у календарі.</div>
    <div class="item-list" id="itemList"></div>
    <div class="add-row">
      <input type="text" id="newItem" placeholder="Новий запис…">
      <button id="addItemBtn">+</button>
    </div>
  </div>
</div>

<!-- theme color popover -->
<div class="color-pop" id="themePop">
  <div class="color-pop-title">Колір календаря</div>
  <div class="color-pop-swatches" id="themePopSwatches"></div>
</div>

<!-- item color popover -->
<div class="color-pop" id="colorPop">
  <div class="color-pop-title">Колір запису</div>
  <div class="color-pop-swatches" id="colorPopSwatches"></div>
</div>

<script>
/* ───────────── constants ───────────── */
const MONTH_NAMES  = ["СІЧЕНЬ","ЛЮТИЙ","БЕРЕЗЕНЬ","КВІТЕНЬ","ТРАВЕНЬ","ЧЕРВЕНЬ","ЛИПЕНЬ","СЕРПЕНЬ","ВЕРЕСЕНЬ","ЖОВТЕНЬ","ЛИСТОПАД","ГРУДЕНЬ"];
const WEEKDAY_NAMES = ["неділя","понеділок","вівторок","середа","четвер","п'ятниця","субота"];
const THEME_COLORS  = ['#1B2027','#141B2D','#1A2421','#231C1C','#1E1A28','#F4F0E6','#E8ECF0'];
const ITEM_COLORS   = ['#D4A94F','#4F8F82','#C1666B','#6B8FC1','#9B7EC8','#E07B54','#7EC1B8'];

/* ───────────── state ───────────── */
const today = new Date();
let viewYear  = today.getFullYear();
let viewMonth = today.getMonth();
let monthCache      = {};
let selectedDateKey = null;
let saveThemeTimer  = null;   // окремий таймер для теми
let saveDataTimer   = null;   // окремий таймер для даних місяця
let saveStatusTimer = null;
let dragState       = null;
let justDropped     = false;
let currentThemeBg  = THEME_COLORS[0];

// попап кольору item: контекст поточного відкритого
let colorPopCtx     = null; // {item, y, m, d, dotEl, rowEl}
let touchDrag       = null;
let touchGhost      = null;
let swipeStartX     = null;
let swipeStartY     = null;

function isMobile(){ return window.matchMedia('(max-width:768px)').matches; }

function cellDateFromEl(cell){
  if(!cell) return null;
  const y=+cell.dataset.y, m=+cell.dataset.m, d=+cell.dataset.d;
  if(Number.isNaN(y)) return null;
  return {y,m,d};
}

/* ───────────── storage ───────────── */
const storage = {
  get(key){ try{ const v=localStorage.getItem(key); return v?{value:v}:null; }catch{return null;} },
  set(key,val){ try{ localStorage.setItem(key,val); }catch(e){ console.error(e); } }
};

/* ───────────── utils ───────────── */
function pad(n){ return n<10?'0'+n:''+n; }
function monthKey(y,m){ return y+'-'+pad(m+1); }
function dayKey(d){ return pad(d); }
function uid(){ return crypto.randomUUID?crypto.randomUUID():'id'+Math.random().toString(36).slice(2); }

function hexToRgb(hex){
  const h = hex.replace('#','');
  const n = parseInt(h.length===3?h.split('').map(c=>c+c).join(''):h, 16);
  return { r:(n>>16)&255, g:(n>>8)&255, b:n&255 };
}
function rgbToHex(r,g,b){
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}
function mixHex(a,b,t){
  const c1=hexToRgb(a), c2=hexToRgb(b);
  return rgbToHex(c1.r+(c2.r-c1.r)*t, c1.g+(c2.g-c1.g)*t, c1.b+(c2.b-c1.b)*t);
}
function luminance(hex){
  const {r,g,b}=hexToRgb(hex);
  return [r,g,b].map(v=>{ v/=255; return v<=.03928?v/12.92:Math.pow((v+.055)/1.055,2.4); })
    .reduce((acc,v,i)=>acc+v*[.2126,.7152,.0722][i],0);
}
function textOnBg(hex){ return luminance(hex)>.4?'#1B2027':'#FFFFFF'; }

/* ───────────── theme ───────────── */
function isValidHex(hex){
  return typeof hex==='string' && /^#([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/.test(hex);
}

function applyBgTheme(bg){
  if(!isValidHex(bg)) bg = THEME_COLORS[0];
  currentThemeBg = bg;
  const dark = luminance(bg) < .4;
  const mix  = dark ? '#FFFFFF' : '#000000';
  const f    = dark ? [.06,.11,.20] : [.04,.07,.14];

  document.documentElement.style.setProperty('--bg',       bg);
  document.documentElement.style.setProperty('--panel',    mixHex(bg,mix,f[0]));
  document.documentElement.style.setProperty('--panel-2',  mixHex(bg,mix,f[1]));
  document.documentElement.style.setProperty('--line',     mixHex(bg,mix,f[2]));
  document.documentElement.style.setProperty('--ink',      dark?'#ECE7DA':'#1B2027');
  document.documentElement.style.setProperty('--muted',    dark?'#8B93A0':'#5A6270');
  document.documentElement.style.setProperty('--accent',   dark?'#D4A94F':'#9A7220');
  const {r,g,b} = hexToRgb(dark?'#D4A94F':'#9A7220');
  document.documentElement.style.setProperty('--accent-dim',`rgba(${r},${g},${b},.18)`);

  const dot = document.getElementById('themeBtnDot');
  if(dot) dot.style.background = bg;

  document.querySelectorAll('#themePopSwatches .swatch[data-color]').forEach(el=>{
    el.classList.toggle('active', el.dataset.color.toLowerCase()===bg.toLowerCase());
  });
  const custom = document.getElementById('themeCustomInput');
  if(custom){
    const isCustom = !THEME_COLORS.some(c=>c.toLowerCase()===bg.toLowerCase());
    custom.closest('.swatch').classList.toggle('active', isCustom);
    custom.value = bg;
  }
}

function buildThemePop(){
  const wrap = document.getElementById('themePopSwatches');
  if(!wrap) return;
  wrap.innerHTML = '';
  THEME_COLORS.forEach(color=>{
    const btn = document.createElement('button');
    btn.type='button'; btn.className='swatch'; btn.style.background=color;
    btn.dataset.color=color; btn.title=color;
    btn.addEventListener('click', e=>{
      e.stopPropagation();
      pickTheme(color);
      closeThemePop();
    });
    wrap.appendChild(btn);
  });
  const lbl = document.createElement('label');
  lbl.className='swatch swatch-custom'; lbl.title='Свій колір';
  const inp = document.createElement('input');
  inp.type='color'; inp.id='themeCustomInput'; inp.value=currentThemeBg;
  inp.addEventListener('input', e=>{ e.stopPropagation(); applyBgTheme(e.target.value); });
  inp.addEventListener('change', e=>{ e.stopPropagation(); pickTheme(e.target.value); });
  lbl.appendChild(inp);
  wrap.appendChild(lbl);
}

function positionPop(pop, anchor){
  const rect = anchor.getBoundingClientRect();
  pop.classList.add('open');
  const popW = pop.offsetWidth || 184;
  const popH = pop.offsetHeight || 110;

  if(isMobile()){
    pop.style.left = '50%';
    pop.style.transform = 'translateX(-50%)';
    if(rect.bottom + popH + 16 < window.innerHeight){
      pop.style.top = (rect.bottom + 8) + 'px';
      pop.style.bottom = 'auto';
    } else {
      pop.style.top = 'auto';
      pop.style.bottom = Math.max(16, window.innerHeight - rect.top + 8) + 'px';
    }
    return;
  }

  let left = rect.right - popW;
  let top = rect.bottom + 8;
  if(left < 8) left = 8;
  if(left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
  if(top + popH > window.innerHeight - 8) top = rect.top - popH - 8;
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';
  pop.style.bottom = 'auto';
  pop.style.transform = '';
}

function openThemePop(){
  closeColorPop();
  const pop = document.getElementById('themePop');
  const btn = document.getElementById('themeBtn');
  buildThemePop();
  applyBgTheme(currentThemeBg);
  positionPop(pop, btn);
  btn.classList.add('open');
}

function closeThemePop(){
  const pop = document.getElementById('themePop');
  const btn = document.getElementById('themeBtn');
  if(pop) pop.classList.remove('open');
  if(btn) btn.classList.remove('open');
}

function toggleThemePop(){
  const pop = document.getElementById('themePop');
  if(pop.classList.contains('open')) closeThemePop();
  else openThemePop();
}

function pickTheme(bg){
  applyBgTheme(bg);
  clearTimeout(saveThemeTimer);
  saveThemeTimer = setTimeout(()=>{
    storage.set('planner-theme', JSON.stringify({bg}));
    flashSaveStatus();
  }, 300);
}

function loadTheme(){
  let bg = THEME_COLORS[0];
  try{
    const res = storage.get('planner-theme');
    if(res){
      const data = JSON.parse(res.value);
      if(isValidHex(data.bg)) bg = data.bg;
    }
  }catch(e){
    console.warn('Не вдалося завантажити тему', e);
  }
  currentThemeBg = bg;
  applyBgTheme(bg);
  buildThemePop();
}

/* ───────────── save helpers ───────────── */
function flashSaveStatus(){
  const el = document.getElementById('saveStatus');
  el.classList.add('show');
  clearTimeout(saveStatusTimer);
  saveStatusTimer = setTimeout(()=>el.classList.remove('show'), 1500);
}
function scheduleSaveMonth(y,m){
  clearTimeout(saveDataTimer);
  saveDataTimer = setTimeout(()=>{ saveMonth(y,m); flashSaveStatus(); }, 300);
}

/* ───────────── data ───────────── */
function loadMonth(y,m){
  const key=monthKey(y,m);
  if(monthCache[key]) return monthCache[key];
  const res = storage.get('planner-month:'+key);
  monthCache[key] = migrateMonthData(res?JSON.parse(res.value):{});
  return monthCache[key];
}
function saveMonth(y,m){
  const key=monthKey(y,m);
  storage.set('planner-month:'+key, JSON.stringify(monthCache[key]||{}));
}
function migrateMonthData(data){
  const out={};
  for(const dk of Object.keys(data)){
    const day=data[dk];
    if(day.items){ out[dk]=day; continue; }
    const items=[];
    (day.tasks||[]).forEach(t=>items.push({
      id:t.id||uid(), text:t.text, done:!!t.done,
      color:t.color||ITEM_COLORS[items.length%ITEM_COLORS.length]
    }));
    out[dk]={items};
  }
  return out;
}
function getDayData(y,m,d){
  const key=monthKey(y,m);
  if(!monthCache[key]) loadMonth(y,m);
  const md=monthCache[key];
  const dk=dayKey(d);
  if(!md[dk]) md[dk]={items:[]};
  if(!md[dk].items) md[dk]=migrateMonthData({[dk]:md[dk]})[dk];
  return md[dk];
}

/* ───────────── drag / move ───────────── */
function moveItem(fromKey,toKey,itemId,insertIdx){
  const fromDay=getDayData(fromKey.y,fromKey.m,fromKey.d);
  const idx=fromDay.items.findIndex(i=>i.id===itemId);
  if(idx<0) return;
  const [item]=fromDay.items.splice(idx,1);

  if(fromKey.y===toKey.y && fromKey.m===toKey.m && fromKey.d===toKey.d){
    fromDay.items.splice(Math.min(insertIdx??fromDay.items.length, fromDay.items.length),0,item);
    scheduleSaveMonth(fromKey.y,fromKey.m);
    return;
  }
  const toDay=getDayData(toKey.y,toKey.m,toKey.d);
  toDay.items.splice(Math.min(insertIdx??toDay.items.length, toDay.items.length),0,item);
  scheduleSaveMonth(fromKey.y,fromKey.m);
  if(monthKey(fromKey.y,fromKey.m)!==monthKey(toKey.y,toKey.m))
    scheduleSaveMonth(toKey.y,toKey.m);
}

function setupCellDrop(cell,cellDate){
  cell.addEventListener('dragover',e=>{
    if(!dragState) return;
    e.preventDefault(); e.dataTransfer.dropEffect='move';
    cell.classList.add('drop-target');
  });
  cell.addEventListener('dragleave',e=>{
    if(!cell.contains(e.relatedTarget)) cell.classList.remove('drop-target');
  });
  cell.addEventListener('drop',e=>{
    e.preventDefault(); cell.classList.remove('drop-target');
    if(!dragState) return;
    moveItem(dragState.fromKey, cellDate, dragState.itemId);
    dragState=null; justDropped=true;
    setTimeout(()=>{ justDropped=false; },150);
    renderCalendar();
    if(selectedDateKey) renderPanelContent();
  });
}

/* ───────────── item color popover (position:fixed) ───────────── */
function openColorPop(dotEl, item, y, m, d){
  closeThemePop();
  colorPopCtx = {item, y, m, d, dotEl};
  const pop    = document.getElementById('colorPop');
  const swWrap = document.getElementById('colorPopSwatches');
  swWrap.innerHTML='';

  ITEM_COLORS.forEach(color=>{
    const btn=document.createElement('button');
    btn.type='button'; btn.className='swatch'; btn.style.background=color;
    btn.classList.toggle('active', color===item.color);
    btn.addEventListener('click',e=>{ e.stopPropagation(); applyItemColor(color); });
    swWrap.appendChild(btn);
  });
  const lbl=document.createElement('label');
  lbl.className='swatch swatch-custom'; lbl.title='Свій колір';
  const inp=document.createElement('input');
  inp.type='color'; inp.value=item.color||ITEM_COLORS[0];
  inp.addEventListener('input', e=>{ e.stopPropagation(); applyItemColor(e.target.value,true); });
  inp.addEventListener('change',e=>{ e.stopPropagation(); applyItemColor(e.target.value); });
  lbl.appendChild(inp); swWrap.appendChild(lbl);

  positionPop(pop, dotEl);
}

function applyItemColor(color, preview=false){
  if(!colorPopCtx) return;
  const {item, y, m, d, dotEl} = colorPopCtx;
  item.color = color;
  dotEl.style.background = color;
  // оновити border row
  const row = dotEl.closest('.item-row');
  if(row) row.style.borderLeftColor=color;
  // оновити active у попапі
  document.querySelectorAll('#colorPopSwatches .swatch[style]').forEach(s=>{
    s.classList.toggle('active', s.style.background===color);
  });
  // зберегти + оновити сітку
  scheduleSaveMonth(y,m);
  renderCalendar();
}

function closeColorPop(){
  document.getElementById('colorPop').classList.remove('open');
  colorPopCtx=null;
}

/* ───────────── touch drag (mobile) ───────────── */
function createTouchGhost(item){
  if(touchGhost) touchGhost.remove();
  touchGhost = document.createElement('div');
  touchGhost.className = 'touch-ghost';
  touchGhost.textContent = item.text;
  touchGhost.style.background = item.color || ITEM_COLORS[0];
  touchGhost.style.color = textOnBg(item.color || ITEM_COLORS[0]);
  document.body.appendChild(touchGhost);
}

function moveTouchGhost(clientX, clientY){
  if(!touchGhost) return;
  touchGhost.classList.add('active');
  const w = touchGhost.offsetWidth;
  const h = touchGhost.offsetHeight;
  touchGhost.style.left = Math.min(clientX - w/2, window.innerWidth - w - 8) + 'px';
  touchGhost.style.top  = (clientY - h - 18) + 'px';
}

function removeTouchGhost(){
  if(touchGhost){ touchGhost.remove(); touchGhost = null; }
}

function clearDropTargets(){
  document.querySelectorAll('.drop-target').forEach(n=>n.classList.remove('drop-target'));
}

function highlightCellAt(x,y){
  clearDropTargets();
  const el = document.elementFromPoint(x,y);
  const cell = el?.closest('.cell');
  if(cell) cell.classList.add('drop-target');
  return cell;
}

function finishTouchDrag(clientX, clientY){
  if(!touchDrag?.moved || !dragState) return false;
  const cell = highlightCellAt(clientX, clientY);
  const toKey = cellDateFromEl(cell);
  if(toKey){
    moveItem(dragState.fromKey, toKey, dragState.itemId);
    justDropped = true;
    setTimeout(()=>{ justDropped=false; },150);
    renderCalendar();
    if(selectedDateKey) renderPanelContent();
    return true;
  }
  return false;
}

function setupTouchDrag(el, item, fromKey){
  el.addEventListener('touchstart', e=>{
    if(e.touches.length!==1) return;
    const t = e.touches[0];
    touchDrag = { itemId:item.id, fromKey, el, startX:t.clientX, startY:t.clientY, moved:false };
  }, {passive:true});

  el.addEventListener('touchmove', e=>{
    if(!touchDrag || touchDrag.itemId!==item.id) return;
    const t = e.touches[0];
    const dx = Math.abs(t.clientX - touchDrag.startX);
    const dy = Math.abs(t.clientY - touchDrag.startY);
    if(!touchDrag.moved && (dx>10 || dy>10)){
      touchDrag.moved = true;
      dragState = { fromKey, itemId:item.id };
      el.classList.add('dragging');
      // show ghost only on mobile
      if(isMobile()) createTouchGhost(item);
    }
    if(touchDrag.moved){
      if(isMobile()) moveTouchGhost(t.clientX, t.clientY);
      highlightCellAt(t.clientX, t.clientY);
      e.preventDefault();
    }
  }, {passive:false});

  el.addEventListener('touchend', e=>{
    if(!touchDrag || touchDrag.itemId!==item.id) return;
    const t = e.changedTouches[0];
    el.classList.remove('dragging');
    removeTouchGhost();
    if(touchDrag.moved) finishTouchDrag(t.clientX, t.clientY);
    clearDropTargets();
    touchDrag = null;
    dragState = null;
  }, {passive:true});

  el.addEventListener('touchcancel', ()=>{
    el.classList.remove('dragging');
    removeTouchGhost();
    clearDropTargets();
    touchDrag = null;
    dragState = null;
  }, {passive:true});
}

/* ───────────── calendar render ───────────── */
function renderCalendar(){
  loadMonth(viewYear,viewMonth);
  document.getElementById('monthTitle').innerHTML=
    MONTH_NAMES[viewMonth]+' <span class="year">'+viewYear+'</span>';

  const grid=document.getElementById('grid');
  grid.innerHTML='';
  const firstWeekday=(new Date(viewYear,viewMonth,1).getDay()+6)%7;
  const daysInMonth =new Date(viewYear,viewMonth+1,0).getDate();
  const daysInPrev  =new Date(viewYear,viewMonth, 0).getDate();
  const totalCells  =Math.ceil((firstWeekday+daysInMonth)/7)*7;
  grid.style.setProperty('--weeks',totalCells/7);

  for(let i=0;i<totalCells;i++){
    let dayNum, isOutside=false, cy=viewYear, cm=viewMonth;
    if(i<firstWeekday){
      dayNum=daysInPrev-(firstWeekday-i-1); isOutside=true;
      cm=viewMonth-1; if(cm<0){cm=11;cy=viewYear-1;}
    } else if(i>=firstWeekday+daysInMonth){
      dayNum=i-(firstWeekday+daysInMonth)+1; isOutside=true;
      cm=viewMonth+1; if(cm>11){cm=0;cy=viewYear+1;}
    } else {
      dayNum=i-firstWeekday+1;
    }

    const cellDate={y:cy,m:cm,d:dayNum};
    const cell=document.createElement('div');
    cell.className='cell'+(isOutside?' outside':'');
    cell.dataset.y=cy; cell.dataset.m=cm; cell.dataset.d=dayNum;
    if(cy===today.getFullYear()&&cm===today.getMonth()&&dayNum===today.getDate())
      cell.className+=' today';

    const num=document.createElement('div');
    num.className='datenum'; num.textContent=dayNum;
    cell.appendChild(num);

    const wrap=document.createElement('div');
    wrap.className='cell-items';
    getDayData(cy,cm,dayNum).items.forEach(item=>{
      const block=document.createElement('div');
      block.className='cell-item'+(item.done?' done':'');
      block.textContent=item.text;
      block.style.background=item.color||ITEM_COLORS[0];
      block.style.color=textOnBg(item.color||ITEM_COLORS[0]);
      block.draggable=true; block.title=item.text;
      block.addEventListener('click',e=>e.stopPropagation());
      block.addEventListener('dragstart',e=>{
        dragState={fromKey:cellDate,itemId:item.id};
        block.classList.add('dragging');
        e.dataTransfer.effectAllowed='move';
        e.dataTransfer.setData('text/plain',item.id);
      });
      block.addEventListener('dragend',()=>{
        block.classList.remove('dragging');
        document.querySelectorAll('.drop-target').forEach(n=>n.classList.remove('drop-target'));
        if(dragState) dragState=null;
      });
      setupTouchDrag(block, item, cellDate);
      wrap.appendChild(block);
    });
    cell.appendChild(wrap);

    cell.addEventListener('click',()=>{ if(!justDropped&&!dragState) openPanel(cy,cm,dayNum); });
    setupCellDrop(cell,cellDate);
    grid.appendChild(cell);
  }
}

/* ───────────── side panel ───────────── */
function openPanel(y,m,d){
  loadMonth(y,m);
  selectedDateKey={y,m,d};
  const dateObj=new Date(y,m,d);
  document.getElementById('panelDate').textContent=d+' '+MONTH_NAMES[m].toLowerCase()+' '+y;
  document.getElementById('panelWeekday').textContent=WEEKDAY_NAMES[dateObj.getDay()];
  document.querySelector('.panel-hint').textContent = isMobile()
    ? 'Утримуй і перетягни запис на інший день. Свайп по календарю — змінити місяць.'
    : 'Перетягни блок на потрібний день у календарі.';
  renderPanelContent();
  document.getElementById('overlay').classList.add('open');
}

function renderPanelContent(){
  if(!selectedDateKey) return;
  const {y,m,d}=selectedDateKey;
  const dd=getDayData(y,m,d);
  const list=document.getElementById('itemList');
  list.innerHTML='';
  if(!dd.items.length){
    const n=document.createElement('div');
    n.className='empty-note'; n.textContent='Записів на цей день ще немає.';
    list.appendChild(n); return;
  }
  dd.items.forEach((item,i)=>list.appendChild(createItemRow(item,i,y,m,d)));
}

function createItemRow(item,index,y,m,d){
  const row=document.createElement('div');
  row.className='item-row'+(item.done?' done':'');
  row.style.borderLeftColor=item.color||ITEM_COLORS[0];
  row.draggable=true;

  const handle=document.createElement('span');
  handle.className='drag-handle'; handle.textContent='⠿';

  const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=item.done;
  cb.addEventListener('change',()=>{
    item.done=cb.checked; scheduleSaveMonth(y,m);
    renderPanelContent(); renderCalendar();
  });

  const span=document.createElement('span');
  span.className='item-text'; span.textContent=item.text;

  const dot=document.createElement('button');
  dot.type='button'; dot.className='color-dot';
  dot.style.background=item.color||ITEM_COLORS[0]; dot.title='Колір запису';
  dot.addEventListener('click',e=>{
    e.stopPropagation();
    if(colorPopCtx&&colorPopCtx.item===item){ closeColorPop(); return; }
    openColorPop(dot,item,y,m,d);
  });

  const del=document.createElement('button');
  del.className='del-btn'; del.textContent='✕'; del.title='Видалити';
  del.addEventListener('click',e=>{
    e.stopPropagation();
    getDayData(y,m,d).items=getDayData(y,m,d).items.filter(x=>x.id!==item.id);
    scheduleSaveMonth(y,m); renderPanelContent(); renderCalendar();
  });

  row.addEventListener('dragstart',e=>{
    dragState={fromKey:{y,m,d},itemId:item.id};
    row.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',item.id);
  });
  row.addEventListener('dragend',()=>{
    row.classList.remove('dragging');
    document.querySelectorAll('.drop-target,.drag-over').forEach(n=>{
      n.classList.remove('drop-target','drag-over');
    });
    if(dragState) dragState=null;
  });
  row.addEventListener('dragover',e=>{
    if(!dragState||dragState.itemId===item.id) return;
    if(dragState.fromKey.y!==y||dragState.fromKey.m!==m||dragState.fromKey.d!==d) return;
    e.preventDefault(); row.classList.add('drag-over');
  });
  row.addEventListener('dragleave',()=>row.classList.remove('drag-over'));
  row.addEventListener('drop',e=>{
    e.preventDefault(); e.stopPropagation();
    row.classList.remove('drag-over');
    if(!dragState) return;
    moveItem(dragState.fromKey,{y,m,d},dragState.itemId,index);
    dragState=null; renderPanelContent(); renderCalendar();
  });

  setupTouchDrag(row, item, {y,m,d});
  row.append(handle,cb,span,dot,del);
  return row;
}

function addItemHandler(){
  const input=document.getElementById('newItem');
  const text=input.value.trim();
  if(!text||!selectedDateKey) return;
  const {y,m,d}=selectedDateKey;
  const dd=getDayData(y,m,d);
  dd.items.push({id:uid(),text,done:false,color:ITEM_COLORS[dd.items.length%ITEM_COLORS.length]});
  input.value='';
  scheduleSaveMonth(y,m); renderPanelContent(); renderCalendar();
  input.focus();
}

/* ───────────── event listeners ───────────── */
document.getElementById('addItemBtn').addEventListener('click', addItemHandler);
document.getElementById('newItem').addEventListener('keydown',e=>{ if(e.key==='Enter') addItemHandler(); });
document.getElementById('panelClose').addEventListener('click',()=>{
  closeColorPop();
  closeThemePop();
  document.getElementById('overlay').classList.remove('open');
});
document.getElementById('overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('overlay')){
    closeColorPop();
    closeThemePop();
    document.getElementById('overlay').classList.remove('open');
  }
});
document.getElementById('prevBtn').addEventListener('click',()=>{
  viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} renderCalendar();
});
document.getElementById('nextBtn').addEventListener('click',()=>{
  viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} renderCalendar();
});
document.getElementById('todayBtn').addEventListener('click',()=>{
  viewYear=today.getFullYear(); viewMonth=today.getMonth(); renderCalendar();
});
document.getElementById('themeBtn').addEventListener('click', e=>{
  e.stopPropagation();
  toggleThemePop();
});

// свайп для зміни місяця на мобільному
const calendarBody = document.querySelector('.calendar-body');
calendarBody.addEventListener('touchstart', e=>{
  if(e.touches.length!==1) return;
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
}, {passive:true});
calendarBody.addEventListener('touchend', e=>{
  if(swipeStartX===null || touchDrag?.moved) { swipeStartX=null; return; }
  const t = e.changedTouches[0];
  const dx = t.clientX - swipeStartX;
  const dy = Math.abs(t.clientY - swipeStartY);
  if(Math.abs(dx)>55 && dy<80){
    if(dx<0){ viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} }
    else { viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} }
    renderCalendar();
  }
  swipeStartX = null;
}, {passive:true});

// закрити панель свайпом вниз (мобільний)
let panelSwipeY = null;
const panelEl = document.querySelector('.panel');
panelEl.addEventListener('touchstart', e=>{
  if(!isMobile() || panelEl.scrollTop>0) return;
  panelSwipeY = e.touches[0].clientY;
}, {passive:true});
panelEl.addEventListener('touchend', e=>{
  if(panelSwipeY===null) return;
  const dy = e.changedTouches[0].clientY - panelSwipeY;
  if(dy>80){
    closeColorPop(); closeThemePop();
    document.getElementById('overlay').classList.remove('open');
  }
  panelSwipeY = null;
}, {passive:true});

// закрити попапи при кліку поза ними
document.addEventListener('click', e=>{
  const themePop = document.getElementById('themePop');
  const themeBtn = document.getElementById('themeBtn');
  if(themePop.classList.contains('open') &&
     !themePop.contains(e.target) && !themeBtn.contains(e.target))
    closeThemePop();
  if(colorPopCtx && !document.getElementById('colorPop').contains(e.target) &&
     !e.target.closest('.color-dot'))
    closeColorPop();
});

/* ───────────── init ───────────── */
(function init(){
  loadTheme();
  renderCalendar();
})();
</script>
